spring.profiles.active=prod
spring.application.name=jbb
server.port=8083
spring.main.web-application-type=servlet

# ===== DB connection =====
spring.datasource.url=jdbc:mysql://localhost:3306/jbb_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=JBB
spring.datasource.password=8329
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== MyBatis basic =====
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=false

# ==== ViewResolver ====
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ===== log check =====
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.messaging=INFO
logging.level.org.springframework.web.socket=INFO
logging.level.com.naver.jbb=INFO

# ===== file upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB